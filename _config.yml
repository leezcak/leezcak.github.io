# =============================================================================
# 턴어페이지 - 데이터 블로그 | Bilingual (KO/EN) + LinkedIn
# =============================================================================

# theme                  : "minimal-mistakes-jekyll"
# remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "contrast"  # ← 변경: 가독성 좋은 스킨

# Site Settings
locale                   : "ko-KR"  # ← 변경: 한국어
rtl                      : false
title                    : "턴어페이지"
title_separator          : "|"
subtitle                 : "Data Blog by a Curious Analyst"
name                     : "턴어페이지 | Turn a Page"
description              : "데이터 분석가의 성장 블로그. 실무 인사이트, 분석 방법론, 커리어 여정을 한국어와 영어로 기록합니다."
url                      : "https://leezcak.github.io"
baseurl                  : ""
repository               : "leezcak/leezcak.github.io"
teaser                   : "/assets/images/default-teaser.png"
logo                     : "/assets/images/logo.png"
masthead_title           : "턴어페이지"
breadcrumbs              : true  # ← 변경: 경로 표시 켜기
words_per_minute         : 150   # ← 변경: 한국어 읽기 속도
enable_copy_code_button  : true  # ← 변경: 코드 복사 버튼
copyright                : "턴어페이지 | Turn a Page"

# =============================================================================
# Comments - giscus ✅ 설정 완료!
# =============================================================================
comments:
  provider               : "giscus"  # ← 변경!
  giscus:
    repo_id              : "R_kgDOPW_cSw"              # ← 입력 완료!
    category_name        : "General"                     # ← 입력 완료!
    category_id          : "DIC_kwDOPW_cS84C3pA9"       # ← 입력 완료!
    discussion_term      : "pathname"
    reactions_enabled    : "1"
    theme                : "preferred_color_scheme"
    strict               : 0
    input_position       : "bottom"
    emit_metadata        : 1
    lang                 : "ko"
    lazy                 : true

reCaptcha:
  siteKey                :
  secret                 :

# =============================================================================
# Feed & Search
# =============================================================================
atom_feed:
  path                   :
  hide                   : false
search                   : true
search_full_content      : true
search_provider          : lunr

# =============================================================================
# SEO - 가입 후 값 입력하세요
# =============================================================================
google_site_verification :   # ← Google Search Console 인증 후 입력
bing_site_verification   :
naver_site_verification  :   # ← Naver Search Advisor 인증 후 입력
yandex_site_verification :
baidu_site_verification  :

# =============================================================================
# Social Sharing & Open Graph (LinkedIn 최적화)
# =============================================================================
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "/assets/images/og-default.png"  # ← 변경: LinkedIn 공유 이미지 (1200x630)
social:
  type                   : "Person"
  name                   : "턴어페이지"
  links:
    - "https://github.com/leezcak"
    - "https://www.linkedin.com/in/YOUR_LINKEDIN_ID"  # ← 본인 LinkedIn URL로 교체!

# =============================================================================
# Analytics
# =============================================================================
analytics:
  provider               : "google-gtag"  # ← GA4 사용 시 변경
  google:
    tracking_id          :   # ← GA4 측정 ID (G-XXXXXXXXXX) 입력
    anonymize_ip         : false

# =============================================================================
# Site Author
# =============================================================================
author:
  name             : "턴어페이지"
  avatar           : "/assets/images/profile.jpg"
  bio              : "Curious Data Analyst 🐣<br>Product · Data · Growth"
  location         : "Seoul, Korea"
  email            : "hmynmsrnl@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/YOUR_LINKEDIN_ID"  # ← 교체!
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/leezcak"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:hmynmsrnl@gmail.com"

# =============================================================================
# Site Footer
# =============================================================================
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/YOUR_LINKEDIN_ID"  # ← 교체!
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/leezcak"

# =============================================================================
# Reading Files
# =============================================================================
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# =============================================================================
# Conversion & Markdown
# =============================================================================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# =============================================================================
# Outputting
# =============================================================================
permalink: /:categories/:title/
timezone: Asia/Seoul

# =============================================================================
# Pagination
# =============================================================================
paginate: 8
paginate_path: /page:num/

# =============================================================================
# Plugins
# =============================================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# =============================================================================
# Archives
# =============================================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# =============================================================================
# HTML Compression
# =============================================================================
compress_html:
  clippings: all
  ignore:
    envs: development

# =============================================================================
# Defaults - 모든 포스트에 자동 적용
# =============================================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true        # ← 변경: 댓글 켜기!
      share: true
      related: true
      show_date: true        # ← 추가: 날짜 표시
      toc: true              # ← 추가: 목차 자동
      toc_label: "목차"
      toc_sticky: true
      sidebar:
        nav: "categories"    # ← 추가: 왼쪽 카테고리 메뉴
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "categories"
